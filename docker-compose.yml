services:
  registry:
    image: registry:2
    restart: unless-stopped
    # Bind to localhost to avoid exposing a registry publicly.
    ports:
      - "127.0.0.1:5001:5000"

  # Railpack needs BuildKit. TCP on 1234 is used so the backend (sibling container) can connect;
  # `docker-container://` often fails from inside another container with "failed to get buildkit information".
  buildkit:
    image: moby/buildkit:v0.29.0
    container_name: buildkit
    privileged: true
    restart: unless-stopped
    volumes:
      - ./buildkit/buildkitd.toml:/etc/buildkit/buildkitd.toml:ro
    # Listen on both a unix socket (for in-container buildctl defaults) and TCP (for sibling containers).
    command:
      [
        "--config",
        "/etc/buildkit/buildkitd.toml",
        "--addr",
        "unix:///run/buildkit/buildkitd.sock",
        "--addr",
        "tcp://0.0.0.0:1234",
      ]

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "2019:2019"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./caddy/dynamic:/etc/caddy/dynamic
      - caddy_data:/data
    command: caddy run --config /etc/caddy/Caddyfile --watch
    depends_on:
      - backend
      - frontend
    # Must match backend: deployment routes use host.docker.internal:<published port>
    # to reach the host-mapped app container; without this, name resolves to an
    # unreachable address on Linux (blank page through :80, direct :port still works).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend:
    build:
      context: ./backend
      target: dev
    depends_on:
      - registry
      - buildkit
    environment:
      HOST: 0.0.0.0
      PORT: "3000"
      # For cloud deployment: CORS_ORIGIN=http://your-public-ip,http://localhost
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      DATABASE_URL: file:/data/brimble.db
      BRIMBLE_WORKSPACE: /data/work
      RAILPACK_BIN: railpack
      DOCKER_SOCKET_PATH: /var/run/docker.sock
      BRIMBLE_HOST_PORT_MIN: "10000"
      BRIMBLE_HOST_PORT_MAX: "11000"
      BRIMBLE_CONTAINER_PORT: "3000"
      BRIMBLE_HEALTH_POLL_MS: "15000"
      # For cloud deployment: BRIMBLE_APPS_BASE_DOMAIN=your-public-ip.nip.io
      BRIMBLE_APPS_BASE_DOMAIN: ${BRIMBLE_APPS_BASE_DOMAIN:-localhost}
      BRIMBLE_DOCKER_UPSTREAM_HOST: host.docker.internal
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://caddy:2019}
      CADDY_DYNAMIC_DIR: /etc/caddy/dynamic
      CADDYFILE_PATH: /etc/caddy/Caddyfile
      BUILDKIT_HOST: tcp://buildkit:1234
      # Local registry: BuildKit pushes to service DNS, Docker daemon pulls via host loopback.
      BRIMBLE_REGISTRY_PUSH_HOST: ${BRIMBLE_REGISTRY_PUSH_HOST:-registry:5000}
      BRIMBLE_REGISTRY_PULL_HOST: ${BRIMBLE_REGISTRY_PULL_HOST:-127.0.0.1:5001}
      # WSL2: "sending tarball" to Docker can exceed 30m; override locally if needed
      PIPELINE_BUILD_TIMEOUT_MS: "3600000"
      PIPELINE_STAGE_TIMEOUT_MS: "120000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - brimble_data:/data
      - ./caddy/dynamic:/etc/caddy/dynamic
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_BASE: ""
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  caddy_data: {}
  backend_node_modules: {}
  frontend_node_modules: {}
  brimble_data: {}
